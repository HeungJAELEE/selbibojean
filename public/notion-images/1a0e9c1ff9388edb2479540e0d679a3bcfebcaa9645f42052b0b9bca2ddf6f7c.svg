<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
<rect width="1200" height="520" fill="#ffffff"/>
<style>
.title{font:700 34px Arial,'Noto Sans KR',sans-serif;fill:#111827}.h{font:700 26px Arial,'Noto Sans KR',sans-serif;fill:#1f2937}.t{font:20px Arial,'Noto Sans KR',sans-serif;fill:#374151}.s{font:18px Arial,'Noto Sans KR',sans-serif;fill:#4b5563}.coil{stroke:#2563eb;stroke-width:8;fill:none;stroke-linecap:round}.wire{stroke:#111827;stroke-width:5;fill:none}.node{fill:#dc2626}.box{fill:#eff6ff;stroke:#93c5fd;stroke-width:2}.note{fill:#fff7ed;stroke:#fdba74;stroke-width:2}
</style>
<text x="600" y="48" text-anchor="middle" class="title">Y(스타)–Δ(델타) 결선과 기동 관계</text>
<rect x="35" y="75" width="535" height="330" rx="20" class="box"/>
<rect x="630" y="75" width="535" height="330" rx="20" class="box"/>
<text x="302" y="115" text-anchor="middle" class="h">Y 결선 — 기동</text>
<text x="897" y="115" text-anchor="middle" class="h">Δ 결선 — 정상 운전</text>
<!-- Y coils -->
<text x="90" y="175" class="t">U1</text><path d="M125 165 h35 q18 -25 36 0 q18 25 36 0 q18 -25 36 0 h45" class="coil"/><text x="330" y="175" class="t">U2</text>
<text x="90" y="245" class="t">V1</text><path d="M125 235 h35 q18 -25 36 0 q18 25 36 0 q18 -25 36 0 h45" class="coil"/><text x="330" y="245" class="t">V2</text>
<text x="90" y="315" class="t">W1</text><path d="M125 305 h35 q18 -25 36 0 q18 25 36 0 q18 -25 36 0 h45" class="coil"/><text x="330" y="315" class="t">W2</text>
<path d="M365 165 H440 V305 M365 235 H440 M365 305 H440" class="wire"/><circle cx="440" cy="235" r="9" class="node"/>
<text x="302" y="365" text-anchor="middle" class="t">U2·V2·W2를 한 점에 연결</text>
<!-- Delta triangle -->
<path d="M785 150 L1015 150 L900 335 Z" class="wire"/>
<path d="M820 150 h30 q16 -23 32 0 q16 23 32 0 q16 -23 32 0 h35" class="coil"/>
<path d="M995 180 l-18 30 q30 4 14 30 q-30 -4 -14 30 q30 4 14 30 l-18 30" class="coil"/>
<path d="M875 320 l-18 -30 q-30 4 -14 -30 q30 -4 14 -30 q-30 4 -14 -30 l-18 -30" class="coil"/>
<circle cx="785" cy="150" r="8" class="node"/><circle cx="1015" cy="150" r="8" class="node"/><circle cx="900" cy="335" r="8" class="node"/>
<text x="760" y="140" class="s">L1</text><text x="1025" y="140" class="s">L2</text><text x="910" y="365" class="s">L3</text>
<text x="897" y="392" text-anchor="middle" class="t">세 권선을 삼각형으로 폐회로 연결</text>
<rect x="150" y="430" width="900" height="68" rx="14" class="note"/>
<text x="600" y="458" text-anchor="middle" class="t">같은 선간전압·동일 임피던스의 기본 시험 조건</text>
<text x="600" y="486" text-anchor="middle" class="h">Y 기동: 권선전압 1/√3 · 선전류 약 1/3 · 기동토크 약 1/3</text>
</svg>