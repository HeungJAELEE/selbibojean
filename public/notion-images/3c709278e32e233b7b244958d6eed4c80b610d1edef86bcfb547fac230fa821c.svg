<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="755" viewBox="0 0 1200 755" role="img" aria-label="모터 선정의 출발점: 출력·토크·속도와 부하곡선을 함께 본다">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#334155"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker>
<style>
text{font-family:Arial,"Noto Sans KR",sans-serif;fill:#0f172a} .title{font-size:32px;font-weight:700}.sub{font-size:18px;fill:#64748b} .h{font-size:22px;font-weight:700}.b{font-size:17px}.s{font-size:15px;fill:#64748b} .tiny{font-size:13px;fill:#64748b} .axis{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arr)} .grid{stroke:#cbd5e1;stroke-width:1;stroke-dasharray:4 5}.panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.label{font-size:16px;font-weight:700}.white{fill:#fff}.num{font-size:26px;font-weight:700}
</style>
</defs>
<rect width="1200" height="755" fill="#fff"/>
<text x="60" y="54" class="title">모터 선정의 출발점: 출력·토크·속도와 부하곡선을 함께 본다</text>
<text x="60" y="84" class="sub">회전동력 P = Tω. 같은 출력이라면 속도가 낮아질수록 필요한 토크는 커진다.</text>
<rect x="55" y="125" width="535" height="500" rx="18" class="panel"/>
<text x="90" y="165" class="h">동일 출력 가정: T ∝ 1/N</text>
<line x1="130" y1="520" x2="535" y2="520" class="axis"/><line x1="130" y1="520" x2="130" y2="215" class="axis"/>
<line x1="130" y1="430" x2="520" y2="430" class="grid"/><line x1="130" y1="340" x2="520" y2="340" class="grid"/><line x1="130" y1="250" x2="520" y2="250" class="grid"/>
<polyline points="130.0,250.0 156.0,310.0 182.0,352.9 208.0,385.0 234.0,410.0 260.0,430.0 286.0,446.4 312.0,460.0 338.0,471.5 364.0,481.4 390.0,490.0 416.0,497.5 442.0,504.1 468.0,510.0 494.0,515.3 520.0,520.0" fill="none" stroke="#2563eb" stroke-width="7"/>
<circle cx="520" cy="520" r="8" fill="#2563eb"/><text x="510" y="555" class="s">100% 속도</text>
<circle cx="260" cy="340" r="8" fill="#2563eb"/><text x="275" y="325" class="label">속도 50% → 토크 2배</text>
<text x="525" y="590" text-anchor="end" class="s">회전속도 N (정규화)</text><text x="86" y="250" transform="rotate(-90 86 250)" class="s">필요 토크 T</text>
<rect x="625" y="125" width="520" height="500" rx="18" class="panel"/>
<text x="660" y="165" class="h">대표 부하토크의 모양</text>
<line x1="695" y1="520" x2="1090" y2="520" class="axis"/><line x1="695" y1="520" x2="695" y2="215" class="axis"/>
<polyline points="695,500 1080,500" fill="none" stroke="#d97706" stroke-width="7"/>
<polyline points="695.0,520.0 714.3,519.3 733.5,517.2 752.8,513.7 772.0,508.8 791.3,502.5 810.5,494.8 829.8,485.7 849.0,475.2 868.3,463.3 887.5,450.0 906.8,435.3 926.0,419.2 945.3,401.7 964.5,382.8 983.8,362.5 1003.0,340.8 1022.3,317.7 1041.5,293.2 1060.8,267.3 1080.0,240.0" fill="none" stroke="#0f766e" stroke-width="7"/>
<text x="850" y="487" class="label" fill="#d97706">컨베이어 등: 거의 일정토크</text>
<text x="850" y="300" class="label" fill="#0f766e">원심 팬·펌프: T ∝ N²</text>
<text x="1080" y="555" text-anchor="end" class="s">속도 N (정규화)</text><text x="650" y="250" transform="rotate(-90 650 250)" class="s">부하토크</text>
<rect x="150" y="650" width="900" height="55" rx="13" fill="#fef3c7"/>
<text x="600" y="674" text-anchor="middle" class="b">모터곡선과 부하곡선의 교점이 운전점. 기동·가속·정지 시간, 관성, 발열과 VFD 한계까지 확인한다.</text>
<text x="600" y="696" text-anchor="middle" class="s">원심형 친화법칙은 유사 운전조건에서의 근사 관계</text>
<line x1="60" y1="713" x2="1140" y2="713" stroke="#cbd5e1"/>
<text x="60" y="738" class="tiny">정규화 개념 그래프 — 실제 토크·속도곡선은 모터·구동기·공정 특성표를 사용</text>
</svg>