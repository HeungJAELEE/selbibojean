<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#f7f8fa"/>
<style>
.t{font-family:Arial,'Noto Sans KR',sans-serif;fill:#17212b}.h{font-size:34px;font-weight:700}.s{font-size:25px;font-weight:700}.b{font-size:21px}.n{font-size:18px}.box{fill:#fff;stroke:#243b53;stroke-width:3;rx:16}.a{stroke:#2463eb;stroke-width:5;fill:none;marker-end:url(#m)}.g{stroke:#1f7a4c;stroke-width:5;fill:none;marker-end:url(#mg)}.warn{fill:#fff3cd;stroke:#c48a00;stroke-width:3;rx:14}
</style>
<defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2463eb"/></marker><marker id="mg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1f7a4c"/></marker></defs>
<text class="t h" x="60" y="62">2026 응시자 복원 연계 · NCS 작업흐름 한눈에 보기</text>
<rect class="box" x="50" y="95" width="720" height="300"/>
<text class="t s" x="80" y="140">① 개회로 제어계 (Open loop)</text>
<rect class="box" x="90" y="190" width="150" height="70"/><text class="t b" x="135" y="234">목표값</text>
<path class="a" d="M245 225 H340"/>
<rect class="box" x="345" y="190" width="160" height="70"/><text class="t b" x="385" y="234">제어장치</text>
<path class="a" d="M510 225 H600"/>
<rect class="box" x="605" y="190" width="130" height="70"/><text class="t b" x="640" y="234">출력</text>
<text class="t b" x="90" y="310">출력을 목표값과 되돌려 비교하지 않음</text>
<text class="t n" x="90" y="350">판별: 출력 → 입력으로 돌아오는 귀환선이 없다.</text>
<rect class="box" x="820" y="95" width="730" height="300"/>
<text class="t s" x="850" y="140">② 폐회로 제어계 (Closed loop)</text>
<rect class="box" x="850" y="190" width="120" height="70"/><text class="t b" x="875" y="234">목표값</text>
<path class="a" d="M975 225 H1045"/>
<circle cx="1080" cy="225" r="34" fill="#fff" stroke="#243b53" stroke-width="3"/><text class="t b" x="1062" y="232">Σ</text>
<path class="a" d="M1115 225 H1180"/>
<rect class="box" x="1185" y="190" width="145" height="70"/><text class="t b" x="1215" y="234">제어장치</text>
<path class="a" d="M1335 225 H1410"/>
<rect class="box" x="1415" y="190" width="100" height="70"/><text class="t b" x="1440" y="234">출력</text>
<path class="g" d="M1465 265 V335 H1080 V265"/>
<text class="t b" x="850" y="310">출력을 검출해 목표값과 비교하고 오차를 수정</text>
<text class="t n" x="850" y="350">별칭: 피드백 제어계·되먹임 제어계</text>
<rect class="box" x="50" y="430" width="1500" height="405"/>
<text class="t s" x="80" y="475">③ 사진 순서형 문제: NCS의 “측정 → 가조립 → 삽입 → 규정 토크” 흐름</text>
<rect class="box" x="90" y="535" width="270" height="110"/><text class="t b" x="132" y="578">플랜지 간극</text><text class="t b" x="132" y="610">상·하·좌·우 측정</text>
<path class="a" d="M365 590 H440"/>
<rect class="box" x="445" y="535" width="270" height="110"/><text class="t b" x="495" y="578">플레이트 삽입</text><text class="t b" x="485" y="610">볼트 8개 가조립</text>
<path class="a" d="M720 590 H795"/>
<rect class="box" x="800" y="535" width="270" height="110"/><text class="t b" x="865" y="578">타이어 삽입</text><text class="t b" x="850" y="610">해머로 완전 밀착</text>
<path class="a" d="M1075 590 H1150"/>
<rect class="box" x="1155" y="535" width="340" height="110"/><text class="t b" x="1212" y="578">대각선 단계 조임</text><text class="t b" x="1210" y="610">제작사 규정 토크 준수</text>
<rect class="warn" x="90" y="690" width="1405" height="100"/>
<text class="t b" x="120" y="733">시험 함정: 고무 타이어를 먼저 억지로 넣는 순서가 아니다.</text>
<text class="t b" x="120" y="766">NCS 핵심 순서 = 간극 측정 → 플레이트·볼트 가조립 → 타이어 삽입·밀착 → 대각선 토크 조임</text>
</svg>