<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="770" viewBox="0 0 1200 770" role="img" aria-label="스트리벡 곡선: 점도·속도·하중이 윤활상태와 마찰을 바꾼다">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#334155"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker>
<style>
text{font-family:Arial,"Noto Sans KR",sans-serif;fill:#0f172a} .title{font-size:32px;font-weight:700}.sub{font-size:18px;fill:#64748b} .h{font-size:22px;font-weight:700}.b{font-size:17px}.s{font-size:15px;fill:#64748b} .tiny{font-size:13px;fill:#64748b} .axis{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arr)} .grid{stroke:#cbd5e1;stroke-width:1;stroke-dasharray:4 5}.panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.label{font-size:16px;font-weight:700}.white{fill:#fff}.num{font-size:26px;font-weight:700}
</style>
</defs>
<rect width="1200" height="770" fill="#fff"/>
<text x="60" y="54" class="title">스트리벡 곡선: 점도·속도·하중이 윤활상태와 마찰을 바꾼다</text>
<text x="60" y="84" class="sub">가로축 ηN/P가 커질수록 점도·속도 효과는 커지고 하중 효과는 작아진다는 뜻이다.</text>
<rect x="55" y="125" width="1090" height="500" rx="18" class="panel"/>
<rect x="145" y="205" width="245" height="340" fill="#fee2e2" opacity=".7"/>
<rect x="390" y="205" width="300" height="340" fill="#fef3c7" opacity=".8"/>
<rect x="690" y="205" width="390" height="340" fill="#ccfbf1" opacity=".65"/>
<line x1="145" y1="545" x2="1095" y2="545" class="axis"/><line x1="145" y1="545" x2="145" y2="185" class="axis"/>
<path d="M165 240 C245 300 320 420 455 480 C560 525 645 510 710 470 C820 400 940 335 1060 285" fill="none" stroke="#2563eb" stroke-width="9"/>
<circle cx="610" cy="503" r="10" fill="#2563eb"/><text x="610" y="465" text-anchor="middle" class="label">마찰 최소 부근</text>
<text x="267" y="245" text-anchor="middle" class="h" fill="#dc2626">경계윤활</text>
<text x="267" y="282" text-anchor="middle" class="s">표면 돌기 접촉 큼</text><text x="267" y="310" text-anchor="middle" class="s">첨가제·재료 영향 큼</text>
<text x="540" y="245" text-anchor="middle" class="h" fill="#d97706">혼합윤활</text>
<text x="540" y="282" text-anchor="middle" class="s">유막 지지 + 돌기 접촉</text>
<text x="885" y="245" text-anchor="middle" class="h" fill="#0f766e">유체윤활</text>
<text x="885" y="282" text-anchor="middle" class="s">유막이 표면을 분리</text><text x="885" y="310" text-anchor="middle" class="s">오른쪽에서는 점성저항 증가</text>
<text x="1080" y="590" text-anchor="end" class="label">ηN/P  (개념적 로그축)</text><text x="100" y="250" transform="rotate(-90 100 250)" class="s">마찰계수 μ</text>
<line x1="315" y1="620" x2="880" y2="620" stroke="#2563eb" stroke-width="4" marker-end="url(#arrB)"/>
<text x="315" y="607" class="b">점도 η 또는 속도 N 증가</text>
<text x="880" y="607" text-anchor="end" class="b">하중 P 감소</text>
<rect x="190" y="665" width="820" height="55" rx="13" fill="#fef3c7"/>
<text x="600" y="689" text-anchor="middle" class="b">‘점도가 높을수록 무조건 좋다’는 오답. 너무 낮으면 유막 부족, 너무 높으면 교반·마찰·발열이 커질 수 있다.</text>
<text x="600" y="711" text-anchor="middle" class="s">EHL·첨가제·표면거칠기·온도에 따라 실제 경계와 곡선은 달라짐</text>
<line x1="60" y1="728" x2="1140" y2="728" stroke="#cbd5e1"/>
<text x="60" y="753" class="tiny">정성적 개념곡선 — ηN/P는 대표적 무차원화 개념이며 적용식은 이론·문제 조건을 확인</text>
</svg>