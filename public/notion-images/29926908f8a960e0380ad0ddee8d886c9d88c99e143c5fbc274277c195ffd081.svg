<rect width="1200" height="750" fill="#fff"/>
<text x="60" y="54" class="title">공기압과 유압이 다르게 느껴지는 이유: 매체의 압축성</text>
<text x="60" y="84" class="sub">같은 피스톤을 눌러도 공기는 부피가 눈에 띄게 줄고, 작동유는 체적 변화가 매우 작다.</text>
<rect x="55" y="125" width="525" height="500" rx="18" fill="#e0f2fe" stroke="#2563eb" stroke-width="2"/>
<rect x="620" y="125" width="525" height="500" rx="18" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
<text x="318" y="170" text-anchor="middle" class="h" fill="#2563eb">공기압: ‘스프링 같은’ 압축공기</text>
<rect x="145" y="235" width="345" height="260" rx="14" fill="#fff" stroke="#334155" stroke-width="4"/>
<rect x="155" y="265" width="325" height="35" fill="#334155"/>
<line x1="318" y1="195" x2="318" y2="255" stroke="#dc2626" stroke-width="8" marker-end="url(#arr)"/>
<path d="M190 350 q18 -28 36 0 t36 0 t36 0 t36 0 t36 0 t36 0" fill="none" stroke="#2563eb" stroke-width="6"/>
