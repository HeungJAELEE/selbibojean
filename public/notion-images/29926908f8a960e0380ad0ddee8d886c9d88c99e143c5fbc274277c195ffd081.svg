<text x="883" y="540" text-anchor="middle" class="b">체적 변화 작음 → 높은 강성, 안정된 저속 제어</text>
<text x="883" y="575" text-anchor="middle" class="label">큰 힘 / 누유·오염·발열 관리 필요</text>
<rect x="175" y="650" width="850" height="52" rx="13" fill="#fef3c7"/>
<text x="600" y="683" text-anchor="middle" class="b">시험 키워드: 공압 = 압축성 큼 · 유압 = 체적탄성계수 큼(압축되기 어려움)</text>
<line x1="60" y1="708" x2="1140" y2="708" stroke="#cbd5e1"/>
<text x="60" y="733" class="tiny">작동유도 완전 비압축성은 아니며, 호스 탄성·혼입 공기는 유압계 강성을 낮춤</text>
</svg>