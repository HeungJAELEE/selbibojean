<text x="318" y="540" text-anchor="middle" class="b">압축·팽창 → 탄성, 응답 지연, 위치 강성 저하</text>
<text x="318" y="575" text-anchor="middle" class="label">빠른 동작·청결 / 정밀 저속·큰 힘에는 불리</text>
<text x="883" y="170" text-anchor="middle" class="h" fill="#0f766e">유압: 거의 비압축성인 작동유</text>
<rect x="710" y="235" width="345" height="260" rx="14" fill="#fff" stroke="#334155" stroke-width="4"/>
<rect x="720" y="250" width="325" height="35" fill="#334155"/>
<line x1="883" y1="195" x2="883" y2="240" stroke="#dc2626" stroke-width="8" marker-end="url(#arr)"/>
