<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="끼워맞춤 3종: 구멍과 축의 ‘가능한 크기 범위’를 비교">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#334155"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker>
<style>
text{font-family:Arial,"Noto Sans KR",sans-serif;fill:#0f172a} .title{font-size:32px;font-weight:700}.sub{font-size:18px;fill:#64748b} .h{font-size:22px;font-weight:700}.b{font-size:17px}.s{font-size:15px;fill:#64748b} .tiny{font-size:13px;fill:#64748b} .axis{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arr)} .grid{stroke:#cbd5e1;stroke-width:1;stroke-dasharray:4 5}.panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.label{font-size:16px;font-weight:700}.white{fill:#fff}.num{font-size:26px;font-weight:700}
</style>
</defs>
<rect width="1200" height="720" fill="#fff"/>
<text x="60" y="54" class="title">끼워맞춤 3종: 구멍과 축의 ‘가능한 크기 범위’를 비교</text>
<text x="60" y="84" class="sub">공칭치수만 보지 말고 구멍·축의 최대/최소 치수에서 틈새와 죔새가 생기는지 본다.</text>
<rect x="55" y="125" width="340" height="460" rx="18" class="panel"/>
<rect x="430" y="125" width="340" height="460" rx="18" class="panel"/>
<rect x="805" y="125" width="340" height="460" rx="18" class="panel"/>
<text x="225" y="165" text-anchor="middle" class="h" fill="#0f766e">틈새 끼워맞춤</text>
<circle cx="225" cy="300" r="104" fill="#e0f2fe" stroke="#2563eb" stroke-width="4"/>
<circle cx="225" cy="300" r="68" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
<line x1="157" y1="300" x2="121" y2="300" stroke="#16a34a" stroke-width="7" marker-end="url(#arr)"/>
<line x1="293" y1="300" x2="329" y2="300" stroke="#16a34a" stroke-width="7" marker-end="url(#arr)"/>
<text x="225" y="435" text-anchor="middle" class="b">가장 큰 축도 가장 작은 구멍보다 작음</text>
<text x="225" y="472" text-anchor="middle" class="label" fill="#16a34a">항상 틈새 S &gt; 0</text>
<text x="600" y="165" text-anchor="middle" class="h" fill="#2563eb">중간 끼워맞춤</text>
<circle cx="600" cy="300" r="92" fill="#e0f2fe" stroke="#2563eb" stroke-width="4" stroke-dasharray="9 7"/>
<circle cx="600" cy="300" r="92" fill="#fef3c7" fill-opacity=".72" stroke="#d97706" stroke-width="4"/>
<path d="M520 238 Q600 175 680 238" fill="none" stroke="#16a34a" stroke-width="5"/>
<path d="M520 362 Q600 425 680 362" fill="none" stroke="#dc2626" stroke-width="5"/>
<text x="600" y="435" text-anchor="middle" class="b">공차 조합에 따라 결과가 바뀜</text>
<text x="600" y="472" text-anchor="middle" class="label">틈새 또는 죔새</text>
<text x="975" y="165" text-anchor="middle" class="h" fill="#dc2626">억지 끼워맞춤</text>
<circle cx="975" cy="300" r="72" fill="#e0f2fe" stroke="#2563eb" stroke-width="4" stroke-dasharray="9 7"/>
<circle cx="975" cy="300" r="108" fill="#fee2e2" fill-opacity=".65" stroke="#dc2626" stroke-width="4"/>
<line x1="880" y1="300" x2="903" y2="300" stroke="#dc2626" stroke-width="7" marker-end="url(#arr)"/>
<line x1="1070" y1="300" x2="1047" y2="300" stroke="#dc2626" stroke-width="7" marker-end="url(#arr)"/>
<text x="975" y="435" text-anchor="middle" class="b">가장 작은 축도 가장 큰 구멍보다 큼</text>
<text x="975" y="472" text-anchor="middle" class="label" fill="#dc2626">항상 죔새 N &gt; 0</text>
<rect x="145" y="610" width="910" height="58" rx="14" fill="#fef3c7"/>
<text x="600" y="646" text-anchor="middle" class="b">대문자 H 등은 구멍, 소문자 h 등은 축의 공차역을 뜻한다. 조립 가능성은 극한치수로 계산한다.</text>
<line x1="60" y1="678" x2="1140" y2="678" stroke="#cbd5e1"/>
<text x="60" y="703" class="tiny">원 크기는 개념 표현용이며 실제 공차비를 뜻하지 않음</text>
</svg>