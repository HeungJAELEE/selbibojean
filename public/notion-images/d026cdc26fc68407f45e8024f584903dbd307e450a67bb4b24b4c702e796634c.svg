<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="정확도와 정밀도: 중심에 가깝나, 서로 모여 있나?">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#334155"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker>
<style>
text{font-family:Arial,"Noto Sans KR",sans-serif;fill:#0f172a} .title{font-size:32px;font-weight:700}.sub{font-size:18px;fill:#64748b} .h{font-size:22px;font-weight:700}.b{font-size:17px}.s{font-size:15px;fill:#64748b} .tiny{font-size:13px;fill:#64748b} .axis{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arr)} .grid{stroke:#cbd5e1;stroke-width:1;stroke-dasharray:4 5}.panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.label{font-size:16px;font-weight:700}.white{fill:#fff}.num{font-size:26px;font-weight:700}
</style>
</defs>
<rect width="1200" height="700" fill="#fff"/>
<text x="60" y="54" class="title">정확도와 정밀도: 중심에 가깝나, 서로 모여 있나?</text>
<text x="60" y="84" class="sub">정확도는 참값과의 거리, 정밀도는 반복 측정값끼리의 흩어짐을 본다.</text>
<text x="165" y="213" text-anchor="middle" class="h" fill="#0f766e">정확·정밀</text><circle cx="165" cy="350" r="110" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><circle cx="165" cy="350" r="78" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><circle cx="165" cy="350" r="48" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><circle cx="165" cy="350" r="18" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><line x1="55" y1="350" x2="275" y2="350" stroke="#e2e8f0"/><line x1="165" y1="240" x2="165" y2="460" stroke="#e2e8f0"/><circle cx="157" cy="353" r="7" fill="#0f766e" opacity=".9"/><circle cx="171" cy="344" r="7" fill="#0f766e" opacity=".9"/><circle cx="169" cy="357" r="7" fill="#0f766e" opacity=".9"/><circle cx="162" cy="341" r="7" fill="#0f766e" opacity=".9"/><circle cx="175" cy="352" r="7" fill="#0f766e" opacity=".9"/><text x="165" y="492" text-anchor="middle" class="b">중심에 가깝고 서로 모임</text><text x="455" y="213" text-anchor="middle" class="h" fill="#2563eb">정확·비정밀</text><circle cx="455" cy="350" r="110" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><circle cx="455" cy="350" r="78" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><circle cx="455" cy="350" r="48" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><circle cx="455" cy="350" r="18" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><line x1="345" y1="350" x2="565" y2="350" stroke="#e2e8f0"/><line x1="455" y1="240" x2="455" y2="460" stroke="#e2e8f0"/><circle cx="390" cy="330" r="7" fill="#2563eb" opacity=".9"/><circle cx="510" cy="374" r="7" fill="#2563eb" opacity=".9"/><circle cx="443" cy="408" r="7" fill="#2563eb" opacity=".9"/><circle cx="490" cy="295" r="7" fill="#2563eb" opacity=".9"/><circle cx="439" cy="345" r="7" fill="#2563eb" opacity=".9"/><text x="455" y="492" text-anchor="middle" class="b">평균은 중심, 값은 흩어짐</text><text x="745" y="213" text-anchor="middle" class="h" fill="#d97706">부정확·정밀</text><circle cx="745" cy="350" r="110" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><circle cx="745" cy="350" r="78" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><circle cx="745" cy="350" r="48" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><circle cx="745" cy="350" r="18" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><line x1="635" y1="350" x2="855" y2="350" stroke="#e2e8f0"/><line x1="745" y1="240" x2="745" y2="460" stroke="#e2e8f0"/><circle cx="790" cy="300" r="7" fill="#d97706" opacity=".9"/><circle cx="803" cy="305" r="7" fill="#d97706" opacity=".9"/><circle cx="795" cy="289" r="7" fill="#d97706" opacity=".9"/><circle cx="809" cy="295" r="7" fill="#d97706" opacity=".9"/><circle cx="799" cy="312" r="7" fill="#d97706" opacity=".9"/><text x="745" y="492" text-anchor="middle" class="b">서로 모이지만 중심에서 벗어남</text><text x="1035" y="213" text-anchor="middle" class="h" fill="#dc2626">부정확·비정밀</text><circle cx="1035" cy="350" r="110" fill="#fff" stroke="#cbd5e1" stroke-width="2"/><circle cx="1035" cy="350" r="78" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><circle cx="1035" cy="350" r="48" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><circle cx="1035" cy="350" r="18" fill="none" stroke="#e2e8f0" stroke-width="1.4"/><line x1="925" y1="350" x2="1145" y2="350" stroke="#e2e8f0"/><line x1="1035" y1="240" x2="1035" y2="460" stroke="#e2e8f0"/><circle cx="957" cy="385" r="7" fill="#dc2626" opacity=".9"/><circle cx="1087" cy="288" r="7" fill="#dc2626" opacity=".9"/><circle cx="1106" cy="392" r="7" fill="#dc2626" opacity=".9"/><circle cx="990" cy="285" r="7" fill="#dc2626" opacity=".9"/><circle cx="1061" cy="416" r="7" fill="#dc2626" opacity=".9"/><text x="1035" y="492" text-anchor="middle" class="b">중심에서도 멀고 흩어짐</text><rect x="145" y="565" width="910" height="70" rx="14" fill="#e0f2fe"/>
<text x="600" y="593" text-anchor="middle" class="label">시험 연결</text>
<text x="600" y="621" text-anchor="middle" class="b">교정·영점 보정은 계통오차를 줄이고, 반복 측정은 흩어짐과 우연오차를 평가한다.</text>
<line x1="60" y1="658" x2="1140" y2="658" stroke="#cbd5e1"/>
<text x="60" y="683" class="tiny">참값을 알 수 없는 현장에서는 기준기·교정 이력·측정불확실도와 함께 판단</text>
</svg>