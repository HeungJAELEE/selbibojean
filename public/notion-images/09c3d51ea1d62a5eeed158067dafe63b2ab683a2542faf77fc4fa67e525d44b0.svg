<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="755" viewBox="0 0 1200 755" role="img" aria-label="욕조곡선: 수명 단계에 따라 고장률의 모양과 보전전략이 달라진다">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#334155"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker>
<style>
text{font-family:Arial,"Noto Sans KR",sans-serif;fill:#0f172a} .title{font-size:32px;font-weight:700}.sub{font-size:18px;fill:#64748b} .h{font-size:22px;font-weight:700}.b{font-size:17px}.s{font-size:15px;fill:#64748b} .tiny{font-size:13px;fill:#64748b} .axis{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arr)} .grid{stroke:#cbd5e1;stroke-width:1;stroke-dasharray:4 5}.panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}.label{font-size:16px;font-weight:700}.white{fill:#fff}.num{font-size:26px;font-weight:700}
</style>
</defs>
<rect width="1200" height="755" fill="#fff"/>
<text x="60" y="54" class="title">욕조곡선: 수명 단계에 따라 고장률의 모양과 보전전략이 달라진다</text>
<text x="60" y="84" class="sub">세 부품군을 단정하는 법칙이 아니라, 대표적인 고장률 패턴을 이해하는 개념 모델이다.</text>
<rect x="55" y="125" width="1090" height="500" rx="18" class="panel"/>
<rect x="130" y="205" width="285" height="340" fill="#e0f2fe" opacity=".7"/>
<rect x="415" y="205" width="360" height="340" fill="#ccfbf1" opacity=".65"/>
<rect x="775" y="205" width="285" height="340" fill="#fef3c7" opacity=".8"/>
<line x1="130" y1="545" x2="1080" y2="545" class="axis"/><line x1="130" y1="545" x2="130" y2="185" class="axis"/>
<path d="M145 240 C190 390 270 445 400 460 C520 472 650 470 775 460 C900 450 980 375 1050 235" fill="none" stroke="#2563eb" stroke-width="9"/>
<line x1="415" y1="205" x2="415" y2="545" stroke="#94a3b8" stroke-dasharray="8 6"/><line x1="775" y1="205" x2="775" y2="545" stroke="#94a3b8" stroke-dasharray="8 6"/>
<text x="272" y="250" text-anchor="middle" class="h" fill="#2563eb">초기고장기</text>
<text x="272" y="290" text-anchor="middle" class="b">고장률 감소</text><text x="272" y="335" text-anchor="middle" class="s">제조·설치·조정 결함</text><text x="272" y="365" text-anchor="middle" class="label">시운전·번인·초기결함 제거</text>
<text x="595" y="250" text-anchor="middle" class="h" fill="#0f766e">우발고장기</text>
<text x="595" y="290" text-anchor="middle" class="b">고장률이 비교적 일정</text><text x="595" y="335" text-anchor="middle" class="s">무작위 스트레스·운전 사건</text><text x="595" y="365" text-anchor="middle" class="label">상태감시·보호·신속복구</text>
<text x="918" y="250" text-anchor="middle" class="h" fill="#d97706">마모고장기</text>
<text x="918" y="290" text-anchor="middle" class="b">고장률 증가</text><text x="918" y="335" text-anchor="middle" class="s">피로·마모·부식·열화</text><text x="918" y="365" text-anchor="middle" class="label">예방교체·오버홀·갱신</text>
<text x="1065" y="580" text-anchor="end" class="s">사용 시간 t</text><text x="90" y="235" transform="rotate(-90 90 235)" class="s">고장률 λ(t)</text>
<rect x="170" y="650" width="860" height="55" rx="13" fill="#fee2e2"/>
<text x="600" y="674" text-anchor="middle" class="b">오답 주의: 우발고장을 단순 주기교체만으로 모두 막을 수는 없다.</text>
<text x="600" y="696" text-anchor="middle" class="s">고장모드가 연령과 관련되는지 확인한 뒤 TBM·CBM·재설계·사후보전을 선택</text>
<line x1="60" y1="713" x2="1140" y2="713" stroke="#cbd5e1"/>
<text x="60" y="738" class="tiny">정성적 개념곡선 — 실제 자산의 고장률 패턴은 이력데이터와 고장모드 분석으로 확인</text>
</svg>